# LimonPOS – Nginx reverse proxy
# Kullanım: Sunucuda /etc/nginx/sites-available/default içeriğini bu dosya ile değiştirin.
# SSL sertifikaları: /etc/letsencrypt/live/the-limon.com-0001/

server {
    listen 80;
    listen [::]:80;
    server_name the-limon.com www.the-limon.com pos.the-limon.com api2.the-limon.com api.the-limon.com;
    # HTTP → HTTPS yönlendirmesi
    return 301 https://$host$request_uri;
}

# Frontend: the-limon.com ve pos.the-limon.com → localhost:3000
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name the-limon.com www.the-limon.com pos.the-limon.com;

    ssl_certificate /etc/letsencrypt/live/the-limon.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the-limon.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Ana sayfa / → /pos (Back-Office basePath)
    location = / {
        return 302 /pos;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Backend API: api2.the-limon.com ve api.the-limon.com → localhost:3002
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api2.the-limon.com api.the-limon.com;

    ssl_certificate /etc/letsencrypt/live/the-limon.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/the-limon.com-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
